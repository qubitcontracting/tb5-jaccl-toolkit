# TB5 JACCL Cluster Configuration
# Edit this file for your hardware setup.

# Default model (override with command line arg)
DEFAULT_MODEL="$HOME/.exo/models/huggingface/mlx-community--Qwen3-235B-A22B-Instruct-2507-8bit"

# Python and tools
PYTHON=/opt/homebrew/bin/python3
MLX_LAUNCH=/opt/homebrew/bin/mlx.launch
TOOLKIT="$HOME/tb5-jaccl-toolkit"

# Server
PORT=8888

# Nodes: ssh hostname for each rank
NODE_0=vader      # rank 0 (largest, gets most layers, runs HTTP server)
NODE_1=voldemort  # rank 1
NODE_2=gargamel   # rank 2

# Thunderbolt interface map
# Format: NODE_IF[rank]=interface_name
# vader:en3 ↔ voldemort:en4, vader:en4 ↔ gargamel:en4, voldemort:en3 ↔ gargamel:en3
NODE_0_IF_TO_1=en3    # vader → voldemort
NODE_0_IF_TO_2=en4    # vader → gargamel
NODE_1_IF_TO_0=en4    # voldemort → vader
NODE_1_IF_TO_2=en3    # voldemort → gargamel
NODE_2_IF_TO_0=en4    # gargamel → vader
NODE_2_IF_TO_1=en3    # gargamel → voldemort

# Thunderbolt IPs (point-to-point /24 subnets)
NODE_0_IP_TO_1=10.0.1.1    # vader side of vader↔voldemort
NODE_1_IP_TO_0=10.0.1.2    # voldemort side of vader↔voldemort
NODE_0_IP_TO_2=10.0.2.1    # vader side of vader↔gargamel
NODE_2_IP_TO_0=10.0.2.2    # gargamel side of vader↔gargamel
NODE_1_IP_TO_2=10.0.3.1    # voldemort side of voldemort↔gargamel
NODE_2_IP_TO_1=10.0.3.2    # gargamel side of voldemort↔gargamel

# RDMA device names (derived from interface names)
# Format: rdma_<interface>
# These map to the JACCL device matrix and RDMA verification

# Hostfile locations (on NODE_0)
HOSTFILE_2NODE="$HOME/.config/mlx/jaccl-hosts-2node.json"
HOSTFILE_3NODE="$HOME/.config/mlx/jaccl-hosts.json"

# Server wrapper script (must exist on all nodes at this path)
SERVER_WRAPPER="$HOME/.config/mlx/server-wrapper.py"
